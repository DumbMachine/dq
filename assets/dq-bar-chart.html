<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Revenue by Region — dq</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #0f0f23;
            --surface: #16213e;
            --border: rgba(255,255,255,0.06);
            --text: #e0e0e0;
            --muted: #666;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        header h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        header .meta {
            font-size: 12px;
            color: var(--muted);
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        #chart {
            flex: 1;
            min-height: 0;
        }
        footer {
            padding: 8px 24px;
            font-size: 11px;
            color: var(--muted);
            text-align: right;
            border-top: 1px solid var(--border);
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1>Revenue by Region</h1>
        <span class="meta">12 rows &middot; bar</span>
    </header>
    <div id="chart"></div>
    <footer>generated by dq</footer>
    <script>
        var chart = echarts.init(document.getElementById('chart'), 'dark');
        chart.setOption({"dataZoom":[{"end":100,"start":0,"type":"inside"}],"grid":{"bottom":"12%","containLabel":true,"left":"8%","right":"4%","top":"14%"},"legend":{"data":["US","EU","APAC"]},"series":[{"data":[120000,140000,155000,170000],"name":"US","type":"bar"},{"data":[95000,110000,125000,140000],"name":"EU","type":"bar"},{"data":[60000,75000,90000,105000],"name":"APAC","type":"bar"}],"title":{"text":"Revenue by Region"},"toolbox":{"feature":{"dataZoom":{},"restore":{},"saveAsImage":{}}},"tooltip":{"trigger":"axis"},"xAxis":{"axisLabel":{"rotate":0},"data":["Q1","Q2","Q3","Q4"],"type":"category"},"yAxis":{"type":"value"}});
        window.addEventListener('resize', function() { chart.resize(); });
    </script>
</body>
</html>
