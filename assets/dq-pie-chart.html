<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Revenue by Segment — dq</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #0f0f23;
            --surface: #16213e;
            --border: rgba(255,255,255,0.06);
            --text: #e0e0e0;
            --muted: #666;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        header h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        header .meta {
            font-size: 12px;
            color: var(--muted);
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        #chart {
            flex: 1;
            min-height: 0;
        }
        footer {
            padding: 8px 24px;
            font-size: 11px;
            color: var(--muted);
            text-align: right;
            border-top: 1px solid var(--border);
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1>Revenue by Segment</h1>
        <span class="meta">4 rows &middot; pie</span>
    </header>
    <div id="chart"></div>
    <footer>generated by dq</footer>
    <script>
        var chart = echarts.init(document.getElementById('chart'), 'dark');
        chart.setOption({"series":[{"data":[{"name":"Enterprise","value":450000},{"name":"SMB","value":280000},{"name":"Self-Serve","value":180000},{"name":"Partner","value":120000}],"emphasis":{"itemStyle":{"shadowBlur":10,"shadowColor":"rgba(0, 0, 0, 0.5)","shadowOffsetX":0}},"label":{"formatter":"{b}: {d}%","show":true},"radius":["40%","70%"],"type":"pie"}],"title":{"text":"Revenue by Segment"},"toolbox":{"feature":{"saveAsImage":{}}},"tooltip":{"formatter":"{b}: {c} ({d}%)","trigger":"item"}});
        window.addEventListener('resize', function() { chart.resize(); });
    </script>
</body>
</html>
